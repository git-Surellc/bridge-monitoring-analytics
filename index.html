<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桥梁监测分析系统</title>
    <style>
      #error-container {
        display: none;
        padding: 20px;
        background-color: #fee2e2;
        color: #991b1b;
        border: 1px solid #fca5a5;
        border-radius: 8px;
        margin: 20px;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="padding: 50px; text-align: center; font-family: sans-serif; color: #333;">
        <h1>⚠️ 正在查看源代码</h1>
        <p>您目前打开的是开发环境的入口文件。</p>
        <p>如果您想使用本应用，请在终端运行以下命令进行构建：</p>
        <pre style="background: #f3f4f6; padding: 15px; border-radius: 8px; display: inline-block; text-align: left;">
npm install
npm run build</pre>
        <p>构建完成后，请打开生成的 <strong>dist/index.html</strong> 文件。</p>
      </div>
    </div>
    <div id="error-container"></div>
    <script>
      window.addEventListener('error', function(event) {
        var container = document.getElementById('error-container');
        if (container) {
          container.style.display = 'block';
          container.innerText = 'Application Error: ' + event.message + '\nAt: ' + event.filename + ':' + event.lineno;
        }
      });
      window.addEventListener('unhandledrejection', function(event) {
        var container = document.getElementById('error-container');
        if (container) {
          container.style.display = 'block';
          container.innerText = 'Unhandled Promise Rejection: ' + event.reason;
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
